<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparkle Garden ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- キラキラ背景 -->
    <div class="sparkle-bg" id="sparkles"></div>
    
    <!-- フローティンググロー -->
    <div class="floating-glow glow-1"></div>
    <div class="floating-glow glow-2"></div>
    <div class="floating-glow glow-3"></div>

    <div class="container">
        <header>
            <h1>✨ Sparkle Garden ✨</h1>
            <p class="subtitle">光と色が踊る、魔法のような空間</p>
        </header>

        <div class="card-grid">
            <div class="card" style="animation-delay: 0.1s;">
                <div class="card-icon" style="color: var(--sky-blue);">🌸</div>
                <h2>空のキャンバス</h2>
                <p>深い青から優しい空色へ。雲のテクスチャが織りなす自然の美しさを表現しています。</p>
            </div>

            <div class="card" style="animation-delay: 0.2s;">
                <div class="card-icon" style="color: var(--lime-green);">🌿</div>
                <h2>緑の丘陵</h2>
                <p>幻想的な緑の風景。柔らかな光が丘を包み込み、静寂の中に輝きが宿ります。</p>
            </div>

            <div class="card" style="animation-delay: 0.3s;">
                <div class="card-icon" style="color: var(--yellow-green);">✨</div>
                <h2>光のグリッド</h2>
                <p>幾何学的なパターンと有機的な色彩の融合。デジタルと自然が調和する新しい美学です。</p>
            </div>
        </div>

        <div class="button-container">
            <button class="glitter-button">もっと見る</button>
        </div>

        <div class="color-palette">
            <div class="color-swatch" style="background: var(--deep-blue);" title="Deep Blue"></div>
            <div class="color-swatch" style="background: var(--sky-blue);" title="Sky Blue"></div>
            <div class="color-swatch" style="background: var(--light-blue);" title="Light Blue"></div>
            <div class="color-swatch" style="background: var(--deep-green);" title="Deep Green"></div>
            <div class="color-swatch" style="background: var(--lime-green);" title="Lime Green"></div>
            <div class="color-swatch" style="background: var(--yellow-green);" title="Yellow Green"></div>
            <div class="color-swatch" style="background: var(--soft-pink);" title="Soft Pink"></div>
            <div class="color-swatch" style="background: var(--purple);" title="Purple"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
