<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAE FEURING - Portfolio Vending Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- カスタムカーソル -->
    <div class="cursor">
        <img src="flower-cursor.svg" alt="" style="width: 100%; height: 100%;">
    </div>
    <div class="cursor-dot"></div>

    <!-- パーティクル -->
    <div class="particles" id="particles"></div>

    <!-- 自販機本体 -->
    <div class="main-container">
        <!-- ハンバーガーメニュー -->
        <button class="menu-toggle" aria-label="Open menu">
            ☰
        </button>

        <!-- 中央上部のロゴ -->
        <img src="name.svg" alt="KAE FEURING PORTFOLIO" class="brand-logo">

        <!-- グリッド（JSで自動生成） -->
        <div class="grid"></div>

        <!-- インフォディスプレイ
        <div class="info-display">
            <div class="info-text">▶ SELECT YOUR ITEM ◀</div>
        </div> -->
    </div>

    <!-- モーダル -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon" id="modalIcon">🎮</div>
                <h2 class="modal-title" id="modalTitle">PROJECT NAME</h2>
                <div class="modal-subtitle" id="modalSubtitle">Category</div>
            </div>
            <div class="modal-body" id="modalBody">
                プロジェクトの詳細がここに表示されます。
            </div>
            <div class="modal-tags" id="modalTags"></div>
            <button class="close-btn" id="closeBtn">×</button>
        </div>
    </div>

    <script src="projects.js"></script>
    <script src="script.js"></script>
</body>
</html>
