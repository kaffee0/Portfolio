<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Figma Replica</title>
<style>
  body {
    background: #110959;
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 209.26px);
    grid-template-rows: repeat(3, 172.34px);
    gap: 50px;
  }

  .tile {
    width: 209.26px;
    height: 172.34px;
    background: #B03537;
    border-radius: 80px;    /* ← Figma の角丸そのまま */
    box-sizing: border-box;
  }

  /* 真ん中だけ強調（Figma の光は後で調整可能） */
  .tile.active {
    border: 4px solid #57B8FF;
    box-shadow: 0 0 30px rgba(87,184,255,0.8);
  }
</style>
</head>
<body>

<div class="grid">
  <div class="tile"></div>
  <div class="tile"></div>
  <div class="tile"></div>
  <div class="tile"></div>

  <div class="tile"></div>
  <div class="tile"></div>
  <div class="tile active"></div>
  <div class="tile"></div>

  <div class="tile"></div>
  <div class="tile"></div>
  <div class="tile"></div>
  <div class="tile"></div>
</div>

</body>
</html>
